{% extends "travel/base.html" %}
{% block body %}

<div class="container mt-4">
  <div class="row">
    {% for place in place_list %}
    <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
      <div class="card h-100">
        <img src="{{ place.place_image }}" class="card-img-top" alt="{{ place.place_name }}" style="height: 200px; object-fit: cover;">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ place.place_name }}</h5>
          <p class="card-text">{{ place.place_desc }}</p>
          <p class="card-text"><small class="text-muted">Rs. {{ place.estimated_cost }}</small></p>
          <a href="{% url 'travel:detail' place.id %}" class="btn btn-primary mt-auto">View Details</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
