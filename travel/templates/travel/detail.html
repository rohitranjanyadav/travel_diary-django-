{% extends "travel/base.html" %}
{% block body %}

<div class="container mt-4">
  <div class="card">
    <div class="row g-0">
      <div class="col-md-6">
        <img src="{{ place.place_image }}" class="img-fluid rounded-start" alt="{{ place.place_name }}">
      </div>
      <div class="col-md-6">
        <div class="card-body">
          <h5 class="card-title">{{ place.place_name }}</h5>
          <p class="card-text">{{ place.place_desc }}</p>
          <p class="card-text"><small class="text-muted">Estimated Cost: Rs. {{ place.estimated_cost }}</small></p>
          <a href="{% url 'travel:update_place' place.id %}" class="btn btn-warning me-2">Edit</a>
          <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal">Delete</button>
          
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteModalLabel">Confirm Deletion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete <strong>{{ place.place_name }}</strong>? This action cannot be undone.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <form action="{% url 'travel:delete_place' place.id %}" method="post" style="display: inline;">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Delete</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
