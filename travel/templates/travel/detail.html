{% extends "travel/base.html" %} {% block body %}

<div class="container">
  <div class="row">
    <div class="col-md-6">
      <img height="300px" class="card" src="{{ place.place_image }}" alt="" />
    </div>
    <div class="col-md-6">
      <h1>{{ place.place_name }}</h1>
      <h2>{{ place.place_desc }}</h2>
      <h3>Rs. {{ place.estimated_cost }}</h3>
    </div>
  </div>
</div>

{% endblock %}
