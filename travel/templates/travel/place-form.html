{% extends "travel/base.html" %} {% block body %}

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">
            {% if place %}Edit Place{% else %}Add New Place{% endif %}
          </h4>
        </div>
        <div class="card-body">
          <form action="" method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label for="{{ form.place_name.id_for_label }}" class="form-label"
                >Place Name</label
              >
              {{ form.place_name }}
            </div>
            <div class="mb-3">
              <label for="{{ form.place_desc.id_for_label }}" class="form-label"
                >Description</label
              >
              {{ form.place_desc }}
            </div>
            <div class="mb-3">
              <label
                for="{{ form.estimated_cost.id_for_label }}"
                class="form-label"
                >Estimated Cost (Rs.)</label
              >
              {{ form.estimated_cost }}
            </div>
            <div class="mb-3">
              <label
                for="{{ form.place_image.id_for_label }}"
                class="form-label"
                >Image URL</label
              >
              {{ form.place_image }}
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Save Place</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
